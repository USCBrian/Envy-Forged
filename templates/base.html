<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Envy Forged{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f0e8;--cream-dark:#ede7d9;--cream-mid:#e8e0cf;
  --gold:#b8922a;--gold-light:#d4aa4a;--cognac:#7a3e1a;
  --ink:#1a1610;--ink-mid:#3a3228;--ink-light:#6b5e4a;
  --border:rgba(184,146,42,0.25);
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:var(--serif);font-size:17px;line-height:1.6;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:72px;background:rgba(245,240,232,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--mono);font-size:13px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink);text-decoration:none}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:2.5rem;align-items:center}
.nav-links a{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-light);text-decoration:none;transition:color 0.2s}
.nav-links a:hover{color:var(--gold)}
.nav-cta{font-family:var(--mono);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--cream);background:var(--ink);padding:0.55rem 1.4rem;text-decoration:none;transition:background 0.2s}
.nav-cta:hover{background:var(--gold)}
main{padding-top:72px;min-height:calc(100vh - 72px)}
footer{border-top:1px solid var(--border);padding:3rem;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:var(--ink-light)}
.container{max-width:1300px;margin:0 auto;padding:0 3rem}
.section-label{font-family:var(--mono);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.btn-primary{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--cream);background:var(--ink);padding:0.9rem 2.4rem;text-decoration:none;border:none;cursor:pointer;transition:background 0.2s}
.btn-primary:hover{background:var(--gold)}
.btn-ghost{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);padding:0.85rem 2.2rem;text-decoration:none;border:none;cursor:pointer;border:1px solid var(--border);background:transparent;transition:border-color 0.2s,color 0.2s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.wheel-card{background:var(--cream-dark);border:1px solid var(--border);transition:transform 0.2s,border-color 0.2s;text-decoration:none;color:var(--ink);display:block}
.wheel-card:hover{transform:translateY(-4px);border-color:var(--gold)}
.wheel-card-img{aspect-ratio:1;background:var(--cream-mid);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;letter-spacing:0.15em;color:var(--ink-light)}
.wheel-card-body{padding:1.4rem}
.wheel-card-sku{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--gold);margin-bottom:0.3rem}
.wheel-card-name{font-size:1.2rem;font-weight:400;margin-bottom:0.4rem}
.wheel-card-sizes{font-family:var(--mono);font-size:10px;color:var(--ink-light);letter-spacing:0.1em}
.wheel-card-construction{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light);margin-top:0.5rem}
.filter-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:3rem;flex-wrap:wrap}
.filter-tab{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:0.8rem 1.5rem;text-decoration:none;color:var(--ink-light);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.2s,border-color 0.2s}
.filter-tab:hover,.filter-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.wheel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
.form-group{margin-bottom:1.5rem}
.form-group label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-light);margin-bottom:0.5rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.75rem 1rem;background:var(--cream-mid);border:1px solid var(--border);font-family:var(--serif);font-size:1rem;color:var(--ink);outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:120px}
select{appearance:none;cursor:pointer}
.pricing-table{width:100%;border-collapse:collapse;margin:1.5rem 0;font-family:var(--mono);font-size:12px}
.pricing-table th{text-align:left;padding:0.6rem 1rem;border-bottom:1px solid var(--border);letter-spacing:0.15em;color:var(--gold);font-weight:400}
.pricing-table td{padding:0.6rem 1rem;border-bottom:1px solid rgba(184,146,42,0.1)}
.pricing-table tr:hover td{background:var(--cream-mid)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
.detail-img{aspect-ratio:1;background:var(--cream-mid);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--ink-light);letter-spacing:0.15em}
.detail-sku{font-family:var(--mono);font-size:11px;letter-spacing:0.25em;color:var(--gold);margin-bottom:0.5rem}
.detail-name{font-size:2.8rem;font-weight:300;line-height:1.1;margin-bottom:0.5rem}
.detail-construction{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-light);margin-bottom:1.5rem}
.detail-desc{font-size:1.1rem;color:var(--ink-mid);margin-bottom:2rem;line-height:1.7}
.detail-ref{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:var(--ink-light);padding:0.6rem 1rem;border-left:2px solid var(--gold);margin-bottom:2rem}
@media(max-width:900px){.detail-grid{grid-template-columns:1fr}nav{padding:0 1.5rem}.container{padding:0 1.5rem}footer{flex-direction:column;gap:1rem;text-align:center}}
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="nav-logo">ENVY<span>.</span>FORGED</a>
  <div class="nav-links">
    <a href="/catalog">Catalog</a>
    <a href="/about">About</a>
    <a href="/quote" class="nav-cta">Get Quote</a>
  </div>
</nav>
<main>{% block content %}{% endblock %}</main>
<footer>
  <span class="nav-logo">ENVY<span style="color:var(--gold)">.</span>FORGED</span>
  <span>A brand under Envy LLC · Colorado</span>
  <span>Built to order. No inventory. No compromise.</span>
</footer>
</body>
</html>
